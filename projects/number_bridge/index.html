<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport configured to prevent accidental tablet gestures like zooming and bouncing -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Number Bridge - Count & Learn</title>
    
    <!-- Child-friendly Rounded Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti Library for sensory-rich rewards -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Beautiful, calm, sensory-friendly HSL Palette */
            --bg-color: hsl(204, 100%, 97%);      /* Soothing very light blue */
            --primary: hsl(330, 90%, 65%);        /* Friendly soft rose pink */
            --secondary: hsl(150, 75%, 42%);      /* Encouraging mint green */
            --yellow: #ffd54f;                    /* Warm gold star yellow */
            --text-color: hsl(208, 45%, 26%);     /* Soft slate blue, no harsh black */
            --tray-bg: hsl(204, 50%, 93%);        /* Frame background */
            --slot-bg: hsl(204, 30%, 88%);        /* Empty frame slots */
            --slot-border: hsl(204, 25%, 82%);
            
            /* Game state card theme colors */
            --card-left-color: hsl(200, 95%, 45%);
            --card-left-shadow: hsl(200, 95%, 32%);
            --card-right-color: hsl(36, 100%, 50%);
            --card-right-shadow: hsl(36, 100%, 37%);
            
            --border-radius: 24px;
            --font-family: 'Fredoka', sans-serif;
        }

        /* Prevent all forms of text selection and default scrolling/bouncing */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: radial-gradient(hsl(204, 80%, 92%) 2px, transparent 2px);
            background-size: 32px 32px;
            font-family: var(--font-family);
            color: var(--text-color);
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px 24px 24px 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            z-index: 10;
        }

        .score-box {
            font-size: 2rem;
            font-weight: 700;
            color: var(--yellow);
            text-shadow: 2px 2px 0px hsl(36, 100%, 40%);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Star filling animation */
        .score-star {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .score-star.pop {
            transform: scale(1.3) rotate(15deg);
        }

        .streak-tracker {
            display: flex;
            gap: 6px;
            background-color: hsla(204, 50%, 90%, 0.8);
            padding: 6px 12px;
            border-radius: 50px;
            border: 2px solid white;
        }

        .streak-star {
            font-size: 1.3rem;
            color: hsl(204, 15%, 80%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .streak-star.active {
            color: var(--yellow);
            text-shadow: 1px 2px 0px hsl(36, 100%, 42%);
            transform: scale(1.2);
        }

        /* Unobtrusive, toddler-safe settings button */
        .settings-btn-trigger {
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: hsla(204, 20%, 80%, 0.3);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            transition: background-color 0.2s;
        }
        
        .settings-btn-trigger svg {
            width: 24px;
            height: 24px;
            fill: hsl(204, 15%, 60%);
            transition: transform 0.5s ease;
            pointer-events: none; /* Prevent child from stealing pointer focus */
        }

        /* Long press visual indicator ring */
        .settings-progress-ring {
            position: absolute;
            top: -2px;
            left: -2px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            border-color: var(--primary) transparent transparent transparent;
            opacity: 0;
            transform: rotate(0deg);
            pointer-events: none; /* Prevent child from stealing pointer focus */
        }
        
        .settings-btn-trigger.holding .settings-progress-ring {
            opacity: 1;
            animation: spinProgress 2s linear forwards;
        }
        
        @keyframes spinProgress {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Main Game Layout --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        #level-badge {
            background-color: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 0 hsl(330, 90%, 50%);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #prompt-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
            min-height: 40px;
            margin-bottom: 5px;
        }

        /* --- Ten-Frame Visual Tray --- */
        #tray-container {
            width: 100%;
            max-width: 680px;
            background: white;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), inset 0 -4px 0 hsl(204, 20%, 90%);
            border: 4px solid white;
        }

        .ten-frame-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            aspect-ratio: 5 / 2;
            background-color: var(--tray-bg);
            border-radius: var(--border-radius);
            padding: 12px;
            border: 3px dashed hsl(204, 25%, 85%);
        }

        .grid-slot {
            background-color: var(--slot-bg);
            border-radius: 18px;
            border: 3px solid var(--slot-border);
            box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }
        
        .grid-slot.active {
            background-color: white;
            border-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
        }

        .tray-emoji {
            font-size: 3.5rem;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.12));
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            transform-origin: center bottom;
        }

        @keyframes bounceIn {
            0% { transform: scale(0) translateY(10px); opacity: 0; }
            60% { transform: scale(1.15) translateY(-5px); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        /* Floating upward correct animation */
        .tray-emoji.success-float {
            animation: emojiFloat 0.8s ease-in-out infinite alternate;
        }
        
        @keyframes emojiFloat {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-12px) scale(1.08); }
        }

        /* --- Choice Cards --- */
        #choices-area {
            display: flex;
            justify-content: center;
            gap: 24px;
            width: 100%;
            max-width: 680px;
            margin-top: 10px;
        }

        .choice-card {
            flex: 1;
            aspect-ratio: 1.4 / 1;
            max-height: 180px;
            border-radius: 28px;
            border: none;
            font-family: var(--font-family);
            font-size: 6rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: transform 0.1s ease, opacity 0.3s ease, filter 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Distinctive left/right button stylings with beautiful 3D borders */
        .choice-card.card-left {
            background-color: var(--card-left-color);
            box-shadow: 0 12px 0 var(--card-left-shadow), 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        .choice-card.card-right {
            background-color: var(--card-right-color);
            box-shadow: 0 12px 0 var(--card-right-shadow), 0 15px 25px rgba(0, 0, 0, 0.15);
        }

        /* 만족스러운 Squish touch effect */
        .choice-card:active:not(.disabled) {
            transform: translateY(8px);
        }
        .choice-card.card-left:active:not(.disabled) {
            box-shadow: 0 4px 0 var(--card-left-shadow), 0 5px 10px rgba(0, 0, 0, 0.15);
        }
        .choice-card.card-right:active:not(.disabled) {
            box-shadow: 0 4px 0 var(--card-right-shadow), 0 5px 10px rgba(0, 0, 0, 0.15);
        }

        /* Errorless learning inactive states */
        .choice-card.disabled {
            opacity: 0.25;
            filter: grayscale(80%);
            cursor: not-allowed;
            pointer-events: none;
            transform: scale(0.95);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Success glow & bounce */
        @keyframes successBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); filter: brightness(1.05); }
        }
        .choice-card.correct-bounce {
            animation: successBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite alternate;
            z-index: 2;
        }

        /* Muted wrong shake */
        @keyframes shakeMuted {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .choice-card.shake-muted {
            animation: shakeMuted 0.4s ease-in-out;
        }

        /* Heartbeat visual pulse for helper hint */
        @keyframes hintPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 16px 0 var(--pulse-shadow), 0 20px 30px rgba(0, 0, 0, 0.2); }
            100% { transform: scale(1); }
        }
        .choice-card.hint-pulse.card-left {
            --pulse-shadow: var(--card-left-shadow);
            animation: hintPulse 1.4s ease-in-out infinite;
        }
        .choice-card.hint-pulse.card-right {
            --pulse-shadow: var(--card-right-shadow);
            animation: hintPulse 1.4s ease-in-out infinite;
        }

        /* --- Full Screen Welcome Overlay --- */
        #welcome-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 100;
            padding: 30px;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        #welcome-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .welcome-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 3px 3px 0px white, 5px 5px 0px rgba(0, 0, 0, 0.05);
        }

        .welcome-description {
            font-size: 1.6rem;
            max-width: 500px;
            color: var(--text-color);
            line-height: 1.4;
        }

        .play-btn {
            font-family: var(--font-family);
            font-size: 3rem;
            font-weight: 700;
            color: white;
            background-color: var(--secondary);
            border: none;
            padding: 24px 70px;
            border-radius: 60px;
            box-shadow: 0 14px 0 hsl(150, 75%, 30%), 0 20px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .play-btn:active {
            transform: translateY(10px);
            box-shadow: 0 4px 0 hsl(150, 75%, 30%), 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        /* --- Parent Dashboard Modal --- */
        #settings-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        #settings-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            width: 90%;
            max-width: 520px;
            background: white;
            border-radius: 36px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border: 4px solid var(--primary);
            max-height: 90%;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .setting-section {
            margin-bottom: 24px;
            border-bottom: 2px dashed hsl(204, 20%, 90%);
            padding-bottom: 20px;
        }
        
        .setting-section:last-of-type {
            border-bottom: none;
            padding-bottom: 0;
        }

        .setting-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 12px;
            display: block;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .setting-option-btn {
            flex: 1;
            min-width: 70px;
            font-family: var(--font-family);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 16px;
            border: 2px solid hsl(204, 20%, 85%);
            background-color: hsl(204, 30%, 97%);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .setting-option-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 8px rgba(244, 143, 177, 0.4);
            transform: translateY(-2px);
        }
        
        .setting-toggle-btn {
            width: 100%;
            font-family: var(--font-family);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px;
            border-radius: 16px;
            border: 2px solid hsl(204, 20%, 85%);
            background-color: hsl(204, 30%, 97%);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        
        .setting-toggle-btn.enabled {
            background-color: hsla(150, 75%, 45%, 0.15);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .setting-toggle-indicator {
            width: 48px;
            height: 26px;
            background-color: hsl(204, 10%, 80%);
            border-radius: 50px;
            position: relative;
            transition: background-color 0.2s;
        }
        
        .setting-toggle-indicator::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            transition: transform 0.2s;
        }
        
        .setting-toggle-btn.enabled .setting-toggle-indicator {
            background-color: var(--secondary);
        }
        
        .setting-toggle-btn.enabled .setting-toggle-indicator::after {
            transform: translateX(22px);
        }

        .modal-close-btn {
            width: 100%;
            font-family: var(--font-family);
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            background-color: var(--secondary);
            border: none;
            padding: 14px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 hsl(150, 75%, 30%), 0 8px 15px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            margin-top: 10px;
        }

        .modal-close-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 hsl(150, 75%, 30%), 0 2px 5px rgba(0,0,0,0.15);
        }

        /* --- Level-Up Visual Celebration Overlay --- */
        #levelup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        #levelup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .levelup-badge-giant {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            background-color: var(--primary);
            padding: 10px 24px;
            border-radius: 50px;
            box-shadow: 0 6px 0 hsl(330, 90%, 50%);
            margin-bottom: 20px;
            animation: levelUpBounce 0.8s infinite alternate;
        }

        .levelup-text {
            font-size: 4rem;
            font-weight: 700;
            color: var(--secondary);
            text-shadow: 2px 4px 0px rgba(0,0,0,0.05);
            text-align: center;
        }
        
        @keyframes levelUpBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        /* --- Responsive Styles for smaller viewport heights & phones --- */
        @media (max-width: 600px) {
            #app-container {
                padding: 10px 12px 12px 12px;
            }
            #prompt-text {
                font-size: 1.6rem;
            }
            .ten-frame-grid {
                gap: 6px;
                padding: 6px;
            }
            .grid-slot {
                border-radius: 10px;
                border-width: 2px;
            }
            .tray-emoji {
                font-size: 2.2rem;
            }
            .choice-card {
                font-size: 4rem;
                border-radius: 20px;
                box-shadow: 0 8px 0 var(--card-left-shadow);
            }
            .choice-card.card-left:active:not(.disabled) {
                box-shadow: 0 3px 0 var(--card-left-shadow);
            }
            .choice-card.card-right:active:not(.disabled) {
                box-shadow: 0 3px 0 var(--card-right-shadow);
            }
            .welcome-title {
                font-size: 2.2rem;
            }
            .welcome-description {
                font-size: 1.1rem;
            }
            .play-btn {
                font-size: 2rem;
                padding: 16px 40px;
            }
            .levelup-text {
                font-size: 2.5rem;
            }
            .streak-tracker {
                gap: 4px;
                padding: 4px 10px;
            }
            .streak-star {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <!-- Start Overlay for Browser Audio Autoplay Compliance -->
    <div id="welcome-overlay">
        <h1 class="welcome-title">Number Bridge 🌈</h1>
        <p class="welcome-description">Hi Caleb! Let's count fun things and match them with numbers!</p>
        <button class="play-btn" id="welcome-play-btn">Play 🚀</button>
    </div>

    <!-- Hidden Settings Dashboard (Parent Lock: 2s hold) -->
    <div id="settings-modal">
        <div class="modal-card">
            <h2 class="modal-title">⚙️ Parent Dashboard</h2>
            
            <!-- Manual Level Setting -->
            <div class="setting-section">
                <span class="setting-label">Manually Set Level</span>
                <div class="btn-group">
                    <button class="setting-option-btn" data-level="1">Level 1<br><small>1-3 (Far)</small></button>
                    <button class="setting-option-btn" data-level="2">Level 2<br><small>1-5 (Far)</small></button>
                    <button class="setting-option-btn" data-level="3">Level 3<br><small>1-5 (Close)</small></button>
                    <button class="setting-option-btn" data-level="4">Level 4<br><small>1-10 (Far)</small></button>
                    <button class="setting-option-btn" data-level="5">Level 5<br><small>1-10 (Close)</small></button>
                </div>
            </div>

            <!-- Theme Settings -->
            <div class="setting-section">
                <span class="setting-label">Emoji Theme</span>
                <div class="btn-group">
                    <button class="setting-option-btn" data-theme="dinosaurs">🦕 Dinosaurs</button>
                    <button class="setting-option-btn" data-theme="vehicles">🚗 Vehicles</button>
                    <button class="setting-option-btn" data-theme="animals">🐶 Animals</button>
                    <button class="setting-option-btn" data-theme="dots">🔴 Dots (More/Less)</button>
                    <button class="setting-option-btn" data-theme="mixed">🌀 Mixed</button>
                </div>
            </div>

            <!-- Audio Toggles -->
            <div class="setting-section">
                <span class="setting-label">Audio Settings</span>
                <button class="setting-toggle-btn enabled" id="toggle-sound">
                    Sound Effects (Chimes)
                    <div class="setting-toggle-indicator"></div>
                </button>
                <button class="setting-toggle-btn enabled" id="toggle-speech">
                    Voice Prompts (Speech)
                    <div class="setting-toggle-indicator"></div>
                </button>
            </div>

            <button class="modal-close-btn" id="modal-close-btn">Done 🌟</button>
        </div>
    </div>

    <!-- Level-Up Modal -->
    <div id="levelup-overlay">
        <div class="levelup-badge-giant" id="levelup-badge-text">Level 2!</div>
        <div class="levelup-text">Super Job! 🎉</div>
    </div>

    <!-- Main App Container -->
    <div id="app-container">
        
        <!-- Header: Displays total score stars, current level progression, and the parent lock trigger -->
        <header>
            <div class="score-box" id="score-display">⭐ <span class="score-star" id="score-val">0</span></div>
            
            <!-- Streak Tracker: 8 stars to Level Up -->
            <div class="streak-tracker">
                <span class="streak-star" id="streak-1">★</span>
                <span class="streak-star" id="streak-2">★</span>
                <span class="streak-star" id="streak-3">★</span>
                <span class="streak-star" id="streak-4">★</span>
                <span class="streak-star" id="streak-5">★</span>
                <span class="streak-star" id="streak-6">★</span>
                <span class="streak-star" id="streak-7">★</span>
                <span class="streak-star" id="streak-8">★</span>
            </div>
            
            <!-- Safe Settings button with hidden progress ring -->
            <div class="settings-btn-trigger" id="settings-trigger">
                <div class="settings-progress-ring"></div>
                <svg viewBox="0 0 24 24">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.04,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </div>
        </header>

        <!-- Main Workspace -->
        <main>
            <div id="level-badge">Level 1</div>
            <h1 id="prompt-text">Can you find 3?</h1>
            
            <!-- Ten-Frame Structured Object Tray -->
            <div id="tray-container">
                <div class="ten-frame-grid" id="ten-frame">
                    <!-- Javascript will dynamically inject exactly 10 slots -->
                </div>
            </div>
            
            <!-- Visual Choice cards (Only 2 options for distraction-free toddler play) -->
            <div id="choices-area">
                <button class="choice-card card-left" id="choice-left">3</button>
                <button class="choice-card card-right" id="choice-right">6</button>
            </div>
        </main>
        
    </div>

    <script>
        // --- Core Configuration and Theme Data ---
        const THEMES = {
            dinosaurs: {
                emojis: ['🦖', '🦕', '🐉', '🐲']
            },
            vehicles: {
                emojis: ['🚗', '🚂', '✈️', '🚀', '🚒', '🚜', '🛳️', '🚁']
            },
            animals: {
                emojis: ['🐶', '🐱', '🐸', '🐨', '🦁', '🐵', '🐼', '🐰']
            },
            dots: {
                emojis: ['🔴', '🔵', '🟡', '🟢', '🟣', '🟠']
            }
        };

        const EMOJI_NAMES = {
            // Dinosaurs & Dragons
            '🦖': ['dinosaur', 'dinosaurs'],
            '🦕': ['dinosaur', 'dinosaurs'],
            '🐉': ['dragon', 'dragons'],
            '🐲': ['dragon', 'dragons'],
            
            // Vehicles
            '🚗': ['car', 'cars'],
            '🚂': ['train', 'trains'],
            '✈️': ['plane', 'planes'],
            '🚀': ['rocket', 'rockets'],
            '🚒': ['fire engine', 'fire engines'],
            '🚜': ['tractor', 'tractors'],
            '🛳️': ['boat', 'boats'],
            '🚁': ['helicopter', 'helicopters'],
            
            // Animals
            '🐶': ['dog', 'dogs'],
            '🐱': ['cat', 'cats'],
            '🐸': ['frog', 'frogs'],
            '🐨': ['koala', 'koalas'],
            '🦁': ['lion', 'lions'],
            '🐵': ['monkey', 'monkeys'],
            '🐼': ['panda', 'pandas'],
            '🐰': ['bunny', 'bunnies'],
            
            // Dots
            '🔴': ['red dot', 'red dots'],
            '🔵': ['blue dot', 'blue dots'],
            '🟡': ['yellow dot', 'yellow dots'],
            '🟢': ['green dot', 'green dots'],
            '🟣': ['purple dot', 'purple dots'],
            '🟠': ['orange dot', 'orange dots']
        };

        const STATE = {
            score: 0,
            streak: 0,
            currentLevel: 1,
            currentTheme: 'mixed',
            correctCount: 0,
            leftValue: 0,
            rightValue: 0,
            correctSide: '',
            soundEnabled: true,
            speechEnabled: true,
            isWaitingInput: false,
            wrongAttemptsThisRound: 0
        };

        // --- DOM Elements ---
        const welcomeOverlay = document.getElementById('welcome-overlay');
        const welcomePlayBtn = document.getElementById('welcome-play-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsTrigger = document.getElementById('settings-trigger');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        
        const scoreVal = document.getElementById('score-val');
        const levelBadge = document.getElementById('level-badge');
        const promptText = document.getElementById('prompt-text');
        const tenFrame = document.getElementById('ten-frame');
        
        const choiceLeftBtn = document.getElementById('choice-left');
        const choiceRightBtn = document.getElementById('choice-right');
        
        const toggleSoundBtn = document.getElementById('toggle-sound');
        const toggleSpeechBtn = document.getElementById('toggle-speech');
        
        const levelupOverlay = document.getElementById('levelup-overlay');
        const levelupBadgeText = document.getElementById('levelup-badge-text');

        // --- Custom Audio Synthesizer Class (Web Audio API) ---
        class WebAudioSynth {
            constructor() {
                this.ctx = null;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playTone(freq, type, duration, delay = 0, volume = 0.15) {
                if (!STATE.soundEnabled) return;
                this.init();
                
                setTimeout(() => {
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    
                    // Cute soft envelope to prevent clicking
                    gainNode.gain.setValueAtTime(0, this.ctx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(volume, this.ctx.currentTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(this.ctx.destination);
                    
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                }, delay * 1000);
            }

            // High-quality major arpeggio chime for correct selection
            playSuccess() {
                // Happy chord progression (C5 -> E5 -> G5 -> C6) using triangle wave
                this.playTone(523.25, 'triangle', 0.5, 0.0, 0.18);
                this.playTone(659.25, 'triangle', 0.5, 0.08, 0.18);
                this.playTone(783.99, 'triangle', 0.5, 0.16, 0.18);
                this.playTone(1046.50, 'triangle', 0.6, 0.24, 0.18);
            }

            // Warm, soft woodblock tone for disabled retry chime (non-punishing)
            playIncorrect() {
                this.playTone(220.00, 'sine', 0.25, 0.0, 0.22);
            }

            // Sparkling synth chime for level-up celebration
            playLevelUp() {
                const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
                notes.forEach((freq, idx) => {
                    this.playTone(freq, 'triangle', 0.4, idx * 0.08, 0.15);
                });
            }
        }
        
        const audioSynth = new WebAudioSynth();

        // --- Custom Speech Synthesizer ---
        const speechManager = {
            synth: window.speechSynthesis,
            voices: [],
            activeUtterances: new Set(),

            init() {
                if (!this.synth) return;
                this.voices = this.synth.getVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = () => {
                        this.voices = this.synth.getVoices();
                    };
                }
            },

            speak(text, callback = null) {
                if (!STATE.speechEnabled) {
                    if (callback) callback();
                    return;
                }
                if (!this.synth) {
                    if (callback) callback();
                    return;
                }
                
                try {
                    // Mute any current speech to prevent overlapping and remain snappy
                    if (this.synth.speaking) {
                        this.synth.cancel();
                    }

                    const utterance = new SpeechSynthesisUtterance(text);
                    
                    // Fine-tuned child-like slow pacing and higher pitch
                    utterance.pitch = 1.35;
                    utterance.rate = 0.85;

                    // Bind English local voice if available
                    const preferredVoice = this.voices.find(v => v.lang.startsWith('en') && v.name.includes('Google') || v.name.includes('Samantha'));
                    if (preferredVoice) {
                        utterance.voice = preferredVoice;
                    }

                    this.activeUtterances.add(utterance);

                    const cleanUp = () => {
                        this.activeUtterances.delete(utterance);
                        if (callback) callback();
                    };

                    utterance.onend = cleanUp;
                    utterance.onerror = cleanUp;

                    this.synth.speak(utterance);
                } catch (e) {
                    console.warn("Speech Synthesis error:", e);
                    if (callback) callback();
                }
            }
        };
        speechManager.init();

        // --- Game Setup and Layout Builders ---
        function setupGrid() {
            tenFrame.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const slot = document.createElement('div');
                slot.className = 'grid-slot';
                slot.id = `slot-${i}`;
                tenFrame.appendChild(slot);
            }
        }

        // --- Distractor & Choice Range Math Logic ---
        function generateOptions(correctCount, level) {
            const candidates = [];
            
            for (let num = 1; num <= 10; num++) {
                if (num === correctCount) continue;
                
                let isValid = false;
                switch (level) {
                    case 1: // Novice: 1-3. Distractor is completely far (4-10)
                        isValid = (num >= 4 && num <= 10);
                        break;
                    case 2: // Easy: 1-5. Distractor is distinct (difference >= 3)
                        isValid = (Math.abs(num - correctCount) >= 3 && num <= 10);
                        break;
                    case 3: // Medium: 1-5. Distractor is close (difference of 1 or 2)
                        isValid = (Math.abs(num - correctCount) <= 2 && num <= 5);
                        break;
                    case 4: // Hard: 1-10. Distractor is distinct (difference >= 4)
                        isValid = (Math.abs(num - correctCount) >= 4 && num <= 10);
                        break;
                    case 5: // Super: 1-10. Distractor is extremely close (difference of 1 or 2)
                        isValid = (Math.abs(num - correctCount) <= 2 && num <= 10);
                        break;
                }
                
                if (isValid) {
                    candidates.push(num);
                }
            }
            
            // If for some reason candidates is empty, fallback safely
            if (candidates.length === 0) {
                return correctCount === 1 ? 10 : 1;
            }
            
            // Pick a random candidate from the pre-filtered valid choices list
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        // --- Star Streak UI Render ---
        function updateStreakStars() {
            for (let i = 1; i <= 8; i++) {
                const star = document.getElementById(`streak-${i}`);
                if (STATE.streak >= i) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            }
        }

        // --- Load & Render New Game Round ---
        function loadNewRound() {
            STATE.wrongAttemptsThisRound = 0;
            updateStreakStars();
            
            // Clean up card states
            choiceLeftBtn.className = 'choice-card card-left';
            choiceRightBtn.className = 'choice-card card-right';
            
            // 1. Determine number range depending on level
            const isRangeUpToFive = (STATE.currentLevel <= 3);
            const maxVal = isRangeUpToFive ? 5 : 10;
            
            // Make sure we generate a random quantity
            STATE.correctCount = Math.floor(Math.random() * maxVal) + 1;
            
            // 2. Generate distractor based on current level logic
            const distractor = generateOptions(STATE.correctCount, STATE.currentLevel);
            
            // 3. Assign to left / right randomly
            const isLeftCorrect = Math.random() < 0.5;
            if (isLeftCorrect) {
                STATE.leftValue = STATE.correctCount;
                STATE.rightValue = distractor;
                STATE.correctSide = 'left';
            } else {
                STATE.leftValue = distractor;
                STATE.rightValue = STATE.correctCount;
                STATE.correctSide = 'right';
            }
            
            // 4. Update the numeral buttons
            choiceLeftBtn.textContent = STATE.leftValue;
            choiceRightBtn.textContent = STATE.rightValue;
            
            // 5. Select Emoji and theme names
            let themeKey = STATE.currentTheme;
            if (themeKey === 'mixed') {
                const keys = Object.keys(THEMES);
                themeKey = keys[Math.floor(Math.random() * keys.length)];
            }
            
            const selectedTheme = THEMES[themeKey];
            const randomEmoji = selectedTheme.emojis[Math.floor(Math.random() * selectedTheme.emojis.length)];
            
            // Resolve specific singular/plural name for this exact emoji
            const emojiNamePair = EMOJI_NAMES[randomEmoji] || ['object', 'objects'];
            const nameString = STATE.correctCount === 1 ? emojiNamePair[0] : emojiNamePair[1];
            
            // 6. Draw Slots inside Ten-Frame
            setupGrid();
            for (let i = 0; i < 10; i++) {
                const slot = document.getElementById(`slot-${i}`);
                if (i < STATE.correctCount) {
                    slot.classList.add('active');
                    const emojiEl = document.createElement('span');
                    emojiEl.className = 'tray-emoji';
                    emojiEl.textContent = randomEmoji;
                    
                    // Bubble pop pop stagger loading animation delay
                    emojiEl.style.animationDelay = `${i * 0.08}s`;
                    slot.appendChild(emojiEl);
                }
            }
            
            // Update HUD level text
            levelBadge.textContent = `Level ${STATE.currentLevel}`;
            
            // 7. Update header prompt text & announce via Speech Synthesis
            promptText.textContent = `Can you find ${STATE.correctCount} ${nameString}?`;
            
            STATE.isWaitingInput = true;
            speechManager.speak(`Can you find ${STATE.correctCount} ${nameString}?`);
        }

        // --- Correct Option Selected Animation & Progress Trigger ---
        function handleCorrectTap(clickedBtn) {
            STATE.isWaitingInput = false;
            
            // Clear hover/pulsing animations
            choiceLeftBtn.classList.remove('hint-pulse');
            choiceRightBtn.classList.remove('hint-pulse');
            
            // Add massive happy correct bounce animation to selected card
            clickedBtn.classList.add('correct-bounce');
            
            // Give all visual grid emojis a floating bounce animation
            document.querySelectorAll('.tray-emoji').forEach(el => {
                el.classList.add('success-float');
            });
            
            // 1. Play synthesized Web Audio success tune
            audioSynth.playSuccess();
            
            // 2. Trigger beautiful scattered confetti popping out from clicked button coordinates
            const rect = clickedBtn.getBoundingClientRect();
            const originX = (rect.left + rect.width / 2) / window.innerWidth;
            const originY = (rect.top + rect.height / 2) / window.innerHeight;
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { x: originX, y: originY },
                colors: ['#ff4081', '#00e676', '#ffd54f', '#00bcd4']
            });

            // 3. Award general score and update display (with micro-scale-pop)
            STATE.score++;
            scoreVal.textContent = STATE.score;
            scoreVal.classList.add('pop');
            setTimeout(() => scoreVal.classList.remove('pop'), 300);

            // 4. Update adaptive progression streak IF they got it right on the first attempt
            let streakLeveledUp = false;
            if (STATE.wrongAttemptsThisRound === 0) {
                STATE.streak++;
                updateStreakStars();
                
                if (STATE.streak >= 8) {
                    streakLeveledUp = true;
                }
            }

            // 5. Speech synthesis pronounces the final digit to bridge auditory/symbolic memory
            speechManager.speak(`${STATE.correctCount}! Super!`);

            // 6. Transition timing
            setTimeout(() => {
                clickedBtn.classList.remove('correct-bounce');
                
                if (streakLeveledUp) {
                    triggerLevelUp();
                } else {
                    loadNewRound();
                }
            }, 1800);
        }

        // --- Errorless Learning Gentle Tap Response ---
        function handleIncorrectTap(clickedBtn, otherBtn) {
            STATE.isWaitingInput = false;
            STATE.wrongAttemptsThisRound++;
            
            // Reset streak on error to guarantee adaptive progression holds
            STATE.streak = 0;
            updateStreakStars();
            
            // Play muted, soothing chime
            audioSynth.playIncorrect();
            
            // Muted shake and scale-shrink button lock
            clickedBtn.classList.add('shake-muted');
            
            // Errorless learning flow: Lock wrong card immediately
            setTimeout(() => {
                clickedBtn.classList.remove('shake-muted');
                clickedBtn.classList.add('disabled');
                
                // Highlight the remaining correct card with gentle breathing heartbeat scale
                otherBtn.classList.add('hint-pulse');
                
                STATE.isWaitingInput = true;
            }, 400);
        }

        // --- Celebratory Level-Up Routine ---
        function triggerLevelUp() {
            STATE.streak = 0;
            
            if (STATE.currentLevel < 5) {
                STATE.currentLevel++;
            } else {
                // Loop back to level 4 or reset to 5 to maintain high achievements
                STATE.currentLevel = 5;
            }
            
            // Trigger beautiful multi-stage confetti sprays across full screen
            audioSynth.playLevelUp();
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 100, origin: { x: 0.2, y: 0.5 } });
            }, 250);
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 100, origin: { x: 0.8, y: 0.5 } });
            }, 500);

            // Open celebratory full-screen card
            levelupBadgeText.textContent = `Level ${STATE.currentLevel}!`;
            levelupOverlay.classList.add('active');
            
            speechManager.speak(`Wow! You made it to Level ${STATE.currentLevel}!`);
            
            setTimeout(() => {
                levelupOverlay.classList.remove('active');
                loadNewRound();
            }, 3000);
        }

        // --- Tap Event Listeners ---
        function onCardClick(side) {
            if (!STATE.isWaitingInput) return;
            
            const isCorrect = (side === STATE.correctSide);
            const clickedBtn = side === 'left' ? choiceLeftBtn : choiceRightBtn;
            const otherBtn = side === 'left' ? choiceRightBtn : choiceLeftBtn;
            
            if (clickedBtn.classList.contains('disabled')) return;

            if (isCorrect) {
                handleCorrectTap(clickedBtn);
            } else {
                handleIncorrectTap(clickedBtn, otherBtn);
                
                // If they miss twice in a row across rounds, automatically downgrade difficulty
                if (STATE.wrongAttemptsThisRound >= 2 && STATE.currentLevel > 1) {
                    STATE.currentLevel--;
                    STATE.streak = 0;
                    updateStreakStars();
                }
            }
        }

        choiceLeftBtn.addEventListener('click', () => onCardClick('left'));
        choiceRightBtn.addEventListener('click', () => onCardClick('right'));

        // Prevent mouse/tap context menu triggers on tablet holds
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- Toddler-Proof Settings Hold Panel (2s duration) ---
        let holdTimer = null;
        
        function startHold(e) {
            // Only allow left mouse click or touch inputs
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            
            e.preventDefault();
            settingsTrigger.classList.add('holding');
            
            holdTimer = setTimeout(() => {
                endHold();
                openParentDashboard();
            }, 2000); // Must hold settings gear for exactly 2 seconds
        }
        
        function cancelHold(e) {
            if (holdTimer) {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
            settingsTrigger.classList.remove('holding');
        }
        
        function endHold() {
            cancelHold();
        }

        // Prevent dragging the settings trigger icon on desktop drag gestures
        settingsTrigger.addEventListener('dragstart', e => e.preventDefault());

        // Unified Pointer Events for desktop mouse and tablet touch screens
        settingsTrigger.addEventListener('pointerdown', startHold);
        window.addEventListener('pointerup', cancelHold);
        window.addEventListener('pointercancel', cancelHold);

        // --- Settings Management ---
        function openParentDashboard() {
            // Setup active visual selections in the dashboard card
            document.querySelectorAll('[data-level]').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.level) === STATE.currentLevel);
            });
            document.querySelectorAll('[data-theme]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === STATE.currentTheme);
            });
            
            toggleSoundBtn.classList.toggle('enabled', STATE.soundEnabled);
            toggleSpeechBtn.classList.toggle('enabled', STATE.speechEnabled);
            
            audioSynth.init(); // Warm AudioContext
            settingsModal.classList.add('active');
        }

        // Handle dashboard click bindings
        document.querySelectorAll('[data-level]').forEach(btn => {
            btn.addEventListener('click', () => {
                STATE.currentLevel = parseInt(btn.dataset.level);
                STATE.streak = 0;
                document.querySelectorAll('[data-level]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.querySelectorAll('[data-theme]').forEach(btn => {
            btn.addEventListener('click', () => {
                STATE.currentTheme = btn.dataset.theme;
                document.querySelectorAll('[data-theme]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        toggleSoundBtn.addEventListener('click', () => {
            STATE.soundEnabled = !STATE.soundEnabled;
            toggleSoundBtn.classList.toggle('enabled', STATE.soundEnabled);
            if (STATE.soundEnabled) audioSynth.playTone(600, 'sine', 0.1);
        });

        toggleSpeechBtn.addEventListener('click', () => {
            STATE.speechEnabled = !STATE.speechEnabled;
            toggleSpeechBtn.classList.toggle('enabled', STATE.speechEnabled);
        });

        modalCloseBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
            loadNewRound();
        });

        // --- Initialize Game ---
        welcomePlayBtn.addEventListener('click', () => {
            // Compliance step: user action allows speech/synth contexts to bind natively
            audioSynth.init();
            speechManager.init();
            
            welcomeOverlay.classList.add('hidden');
            
            audioSynth.playSuccess();
            speechManager.speak("Let's play!");
            setTimeout(loadNewRound, 300);
        });
    </script>
