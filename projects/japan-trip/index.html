<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip Planner 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>🇯🇵 Japan Trip 2026</h1>
            <p class="subtitle">A Toddler-Friendly Adventure</p>
            <div class="flight-summary">
                <div class="flight-item">
                    <span class="label">Departure</span>
                    <span class="value">May 16 • SJC → NRT</span>
                </div>
                <div class="flight-item">
                    <span class="label">Return</span>
                    <span class="value">Jun 1 • NRT → SJC</span>
                </div>
            </div>
        </div>
    </header>

    <main id="itinerary-container" class="container">
        <!-- Phases will be injected here -->
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Japan Trip Planner • Designed for Little Explorers</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
